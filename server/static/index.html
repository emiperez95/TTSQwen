<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTSQwen</title>
    <link rel="stylesheet" href="/static/style.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="/static/app.js"></script>
</head>
<body x-data x-init="$store.app.init()">
    <div class="container">

        <!-- Header -->
        <header>
            <h1>TTS<span>Qwen</span></h1>
            <div class="server-status">
                <span class="status-dot" :class="{ offline: !$store.app.serverOnline }"></span>
                <span x-text="$store.app.serverOnline ? 'Server online' : 'Server offline'"></span>
            </div>
        </header>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn" :class="{ active: $store.app.tab === 'playground' }"
                    @click="$store.app.tab = 'playground'">Playground</button>
            <button class="tab-btn" :class="{ active: $store.app.tab === 'presets' }"
                    @click="$store.app.tab = 'presets'">Presets</button>
            <button class="tab-btn" :class="{ active: $store.app.tab === 'voices' }"
                    @click="$store.app.tab = 'voices'">Voices</button>
            <button class="tab-btn" :class="{ active: $store.app.tab === 'history' }"
                    @click="$store.app.tab = 'history'">History</button>
        </div>

        <!-- ═══ Playground Tab ═══ -->
        <div x-show="$store.app.tab === 'playground'" x-data="playground()" x-cloak>
            <div class="card">
                <!-- Preset selector -->
                <div class="form-group">
                    <label>Preset</label>
                    <div style="display: flex; gap: 8px">
                        <select x-model="selectedPreset" @change="loadPreset()" style="flex:1">
                            <option value="">-- manual settings --</option>
                            <template x-for="p in presets" :key="p.name">
                                <option :value="p.name" x-text="p.name"></option>
                            </template>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="tts-text">Text</label>
                    <textarea id="tts-text" x-model="text" placeholder="Enter text to speak..."
                              rows="4" @keydown.meta.enter="generate()"></textarea>
                </div>

                <div class="form-row" style="margin-bottom: 12px">
                    <div>
                        <label class="checkbox-label">
                            <input type="checkbox" x-model="summarize">
                            Summarize text
                        </label>
                    </div>
                </div>

                <div class="form-row">
                    <div>
                        <label>Voice</label>
                        <select x-model="selectedVoice" @change="onVoiceChange()">
                            <optgroup label="Preset Speakers">
                                <template x-if="config">
                                    <template x-for="s in config.speakers" :key="s">
                                        <option :value="'speaker:' + s" x-text="s"></option>
                                    </template>
                                </template>
                            </optgroup>
                            <template x-if="clonedVoices.length > 0">
                                <optgroup label="Cloned Voices">
                                    <template x-for="v in clonedVoices" :key="v.name">
                                        <option :value="'voice:' + v.name" x-text="v.name"></option>
                                    </template>
                                </optgroup>
                            </template>
                        </select>
                    </div>
                    <div>
                        <label>Language</label>
                        <select x-model="language">
                            <template x-if="config">
                                <template x-for="l in config.languages" :key="l">
                                    <option :value="l" x-text="l"></option>
                                </template>
                            </template>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div>
                        <label>Speed</label>
                        <input type="number" x-model.number="speed" min="0.5" max="2.0" step="0.1">
                    </div>
                    <div>
                        <label>Instruct <span style="color:var(--text-muted)">(optional style)</span></label>
                        <input type="text" x-model="instruct" placeholder="e.g. whispering, excited">
                    </div>
                </div>

                <div style="margin-top: 16px">
                    <button class="btn btn-primary" @click="generate()" :disabled="loading || !text.trim()">
                        <template x-if="loading"><span class="spinner"></span></template>
                        <span x-text="loading ? 'Generating...' : 'Generate Speech'"></span>
                    </button>
                </div>
            </div>

            <!-- Result -->
            <template x-if="result">
                <div class="result-card">
                    <audio :src="result.audio_url" controls autoplay></audio>
                    <div class="result-meta">
                        <template x-if="result.preset">
                            <span x-text="result.preset" style="background: var(--accent); color: #fff"></span>
                        </template>
                        <span x-text="result.voice || result.speaker"></span>
                        <span x-text="result.language"></span>
                        <span x-text="result.duration + 's'"></span>
                        <span x-text="'TTS: ' + result.tts_time + 's'"></span>
                        <template x-if="result.summarized">
                            <span x-text="'Summarize: ' + result.summarize_time + 's'"></span>
                        </template>
                    </div>
                    <template x-if="result.summarized && result.text_spoken !== result.text_input">
                        <div class="spoken-text" x-text="result.text_spoken"></div>
                    </template>
                </div>
            </template>
        </div>

        <!-- ═══ Presets Tab ═══ -->
        <div x-show="$store.app.tab === 'presets'" x-data="presets()" x-cloak>
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px">
                    <div class="card-title" style="margin-bottom: 0">TTS Presets</div>
                    <button class="btn btn-primary btn-sm" @click="newPreset()" x-show="!editing">New Preset</button>
                </div>

                <!-- Preset list -->
                <template x-if="!editing && presets.length === 0">
                    <div class="empty-state">No presets yet. Create one to save your favorite settings.</div>
                </template>

                <template x-if="!editing">
                    <div>
                        <template x-for="p in presets" :key="p.name">
                            <div class="preset-item">
                                <div class="preset-info">
                                    <div class="preset-name" x-text="p.name"></div>
                                    <div class="preset-details">
                                        <span x-text="p.voice ? ('voice: ' + p.voice) : ('speaker: ' + p.speaker)"></span>
                                        <span x-text="p.language"></span>
                                        <span x-text="'speed: ' + p.speed"></span>
                                        <template x-if="p.summarize"><span>summarize</span></template>
                                        <template x-if="p.instruct"><span x-text="'instruct: ' + p.instruct" class="preset-instruct"></span></template>
                                    </div>
                                </div>
                                <div class="preset-actions">
                                    <button class="btn btn-ghost btn-sm" @click="useInPlayground(p)">Use</button>
                                    <button class="btn btn-ghost btn-sm" @click="editPreset(p)">Edit</button>
                                    <button class="btn btn-danger btn-sm" @click="deletePreset(p.name)">Del</button>
                                </div>
                            </div>
                        </template>
                    </div>
                </template>

                <!-- Edit / New form -->
                <template x-if="editing">
                    <div class="preset-form">
                        <div class="form-group">
                            <label>Preset Name</label>
                            <input type="text" x-model="editing.name" placeholder="e.g. DnD Narrator"
                                   :disabled="!editing._isNew">
                        </div>

                        <div class="form-row" style="margin-bottom: 12px">
                            <div>
                                <label class="checkbox-label">
                                    <input type="checkbox" x-model="editing._useVoice">
                                    Use cloned voice
                                </label>
                            </div>
                            <div>
                                <label class="checkbox-label">
                                    <input type="checkbox" x-model="editing.summarize">
                                    Summarize text
                                </label>
                            </div>
                        </div>

                        <div class="form-row">
                            <div x-show="!editing._useVoice">
                                <label>Speaker</label>
                                <select x-model="editing.speaker">
                                    <template x-for="s in speakers" :key="s">
                                        <option :value="s" x-text="s"></option>
                                    </template>
                                </select>
                            </div>
                            <div x-show="editing._useVoice">
                                <label>Cloned Voice</label>
                                <select x-model="editing.voice">
                                    <option value="">-- select --</option>
                                    <template x-for="v in clonedVoices" :key="v.name">
                                        <option :value="v.name" x-text="v.name"></option>
                                    </template>
                                </select>
                            </div>
                            <div>
                                <label>Language</label>
                                <select x-model="editing.language">
                                    <option>English</option>
                                    <option>Chinese</option>
                                    <option>Japanese</option>
                                    <option>Korean</option>
                                    <option>Spanish</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-row">
                            <div>
                                <label>Speed</label>
                                <input type="number" x-model.number="editing.speed" min="0.5" max="2.0" step="0.1">
                            </div>
                            <div>
                                <label>Instruct <span style="color:var(--text-muted)">(optional)</span></label>
                                <input type="text" x-model="editing.instruct" placeholder="e.g. whispering, excited">
                            </div>
                        </div>

                        <div style="margin-top: 16px; display: flex; gap: 8px">
                            <button class="btn btn-primary" @click="savePreset()">Save</button>
                            <button class="btn btn-ghost" @click="cancelEdit()">Cancel</button>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <!-- ═══ Voices Tab ═══ -->
        <div x-show="$store.app.tab === 'voices'" x-data="voices()" x-cloak>

            <!-- Preset voices -->
            <div class="card">
                <div class="card-title">Preset Speakers</div>
                <div class="voice-grid">
                    <template x-for="v in preset" :key="v.name">
                        <div class="voice-card">
                            <div class="voice-name" x-text="v.name"></div>
                            <div class="voice-lang" x-text="v.language"></div>
                            <div class="voice-desc" x-text="v.description"></div>
                            <div class="voice-actions">
                                <audio :src="'/api/voices/' + v.name.toLowerCase() + '/preview'"
                                       controls preload="none"></audio>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Cloned voices -->
            <div class="card">
                <div class="card-title">Cloned Voices</div>
                <template x-if="cloned.length === 0">
                    <div class="empty-state">No cloned voices yet</div>
                </template>
                <div class="voice-grid">
                    <template x-for="v in cloned" :key="v.name">
                        <div class="voice-card">
                            <div class="voice-name" x-text="v.name"></div>
                            <div class="voice-lang" x-text="v.has_transcript ? 'Has transcript' : 'No transcript'"></div>
                            <div class="voice-actions">
                                <audio :src="'/api/voices/' + v.name + '/preview'"
                                       controls preload="none"></audio>
                                <button class="btn btn-danger btn-sm" @click="deleteVoice(v.name)">Del</button>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Upload -->
            <div class="card">
                <div class="card-title">Upload New Voice</div>
                <div class="form-row">
                    <div>
                        <label>Voice name</label>
                        <input type="text" x-model="uploadName"
                               placeholder="lowercase_with_underscores" pattern="[a-z][a-z0-9_]*">
                    </div>
                    <div>
                        <label>Transcript <span style="color:var(--text-muted)">(optional)</span></label>
                        <input type="text" x-model="uploadTranscript"
                               placeholder="What the speaker says in the audio">
                    </div>
                </div>

                <div class="upload-zone" :class="{ dragover }"
                     @dragover.prevent="dragover = true"
                     @dragleave.prevent="dragover = false"
                     @drop.prevent="handleDrop($event)"
                     @click="$refs.fileInput.click()">
                    <input type="file" accept=".wav,.mp3,.ogg,.flac" x-ref="fileInput"
                           @change="handleFileSelect($event)">
                    <template x-if="!uploadFileName">
                        <span>Drop audio file here or click to select</span>
                    </template>
                    <template x-if="uploadFileName">
                        <span x-text="uploadFileName"></span>
                    </template>
                </div>

                <div style="margin-top: 12px">
                    <button class="btn btn-primary" @click="upload()"
                            :disabled="uploading || !uploadName || !uploadFile">
                        <template x-if="uploading"><span class="spinner"></span></template>
                        <span x-text="uploading ? 'Uploading...' : 'Upload Voice'"></span>
                    </button>
                </div>
            </div>
        </div>

        <!-- ═══ History Tab ═══ -->
        <div x-show="$store.app.tab === 'history'" x-data="history()" x-cloak>
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px">
                    <div style="display: flex; align-items: center; gap: 12px">
                        <div class="card-title" style="margin-bottom: 0">Recent Generations</div>
                        <select x-model="filterPreset" style="width: auto; padding: 4px 28px 4px 8px; font-size: 0.8rem">
                            <option value="">All</option>
                            <template x-for="p in presets" :key="p.name">
                                <option :value="p.name" x-text="p.name"></option>
                            </template>
                            <option value="__none__">No preset</option>
                        </select>
                    </div>
                    <div style="display: flex; gap: 8px">
                        <button class="btn btn-ghost btn-sm" @click="load()">Refresh</button>
                        <button class="btn btn-danger btn-sm" @click="clearAll()"
                                x-show="entries.length > 0">Clear All</button>
                    </div>
                </div>

                <template x-if="loading">
                    <div class="empty-state"><span class="spinner"></span></div>
                </template>

                <template x-if="!loading && filteredEntries.length === 0">
                    <div class="empty-state" x-text="entries.length === 0 ? 'No history yet. Generate some speech in the Playground!' : 'No entries match this filter.'"></div>
                </template>

                <template x-for="entry in filteredEntries" :key="entry.id">
                    <div class="history-item" :class="{ 'history-pinned': entry.pinned }">
                        <div class="history-info">
                            <div class="history-text">
                                <span x-show="entry.pinned" title="Pinned" style="margin-right: 4px">&#128204;</span>
                                <span x-text="entry.text_input"></span>
                            </div>
                            <div class="history-meta">
                                <template x-if="entry.preset">
                                    <span class="history-preset-badge" x-text="entry.preset"></span>
                                </template>
                                <span x-text="(entry.voice || entry.speaker) + ' · ' + entry.language + ' · ' + entry.duration + 's'"></span>
                                · <span x-text="formatTime(entry.id)"></span>
                            </div>
                        </div>
                        <div class="history-audio">
                            <audio :src="entry.audio_url" controls preload="none"></audio>
                        </div>
                        <div class="history-actions">
                            <button class="btn btn-ghost btn-sm" @click="togglePin(entry)"
                                    :title="entry.pinned ? 'Unpin' : 'Pin'"
                                    x-text="entry.pinned ? 'Unpin' : 'Pin'"></button>
                            <button class="btn btn-ghost btn-sm" @click="reuseSettings(entry)"
                                    title="Reuse settings">Reuse</button>
                            <button class="btn btn-danger btn-sm" @click="deleteEntry(entry.id)"
                                    title="Delete">Del</button>
                        </div>
                    </div>
                </template>
            </div>
        </div>

    </div>

    <!-- Toast -->
    <template x-if="$store.app.toast">
        <div class="toast" :class="$store.app.toast.type" x-text="$store.app.toast.msg"></div>
    </template>

</body>
</html>
